<html lang="it">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestione Farmaci - Casa di Riposo</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f1f5f9;
      padding: 30px;
    }

    .container {
      max-width: 1100px;
      margin: auto;
    }

    .card {

      border-radius: 20px;
      padding: 25px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.08);
      margin-bottom: 20px;
    }

    h1 {
      color: #1e293b;
      margin-bottom: 10px;
    }

    h2 {
      margin-bottom: 20px;
      color: #1e293b;
    }

    .warning {
      background: #fee2e2;
      color: #b91c1c;
      border: 1px solid #fca5a5;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    input {

      padding: 12px;

      margin-bottom: 15px;

    }

      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;

    }

    .btn-primary {

      color: white;
      width: 100%;
    }

    .btn-primary:hover {
      background: #1d4ed8;
    }
